<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsilenced Co. | Linkspiration</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --plum:#2C1A2E;
  --plum-mid:#452A48;
  --plum-pale:#F3ECF3;
  --sovereign:#6B3058;
  --gold:#C9922A;
  --gold-light:#E0B366;
  --gold-pale:#FBF3E5;
  --blush:#F2E4D8;
  --ivory:#FAF7F3;
  --ink:#231821;
  --ink-soft:#6E5E6C;
  --ink-pale:#B1A0AE;
  --white:#FFFFFF;
  --border:rgba(44,26,46,0.12);
  --border-mid:rgba(44,26,46,0.22);
  --radius:10px;
  --radius-lg:18px;
  --shadow:0 4px 24px rgba(44,26,46,0.10);
}
body{font-family:'Inter',sans-serif;background:var(--ivory);color:var(--ink);font-size:14px;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
.dot{color:var(--gold)}

/* ===== LOGIN ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--plum);padding:20px;position:relative;overflow:hidden}
.login-wrap::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(201,146,42,0.14),transparent 70%);top:-180px;right:-160px}
.login-box{background:var(--ivory);border-radius:var(--radius-lg);padding:48px 40px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,0.35);text-align:center;position:relative;z-index:1}
.wordmark{font-family:'Playfair Display',serif;font-size:32px;font-weight:600;color:var(--plum);margin-bottom:4px}
.wordmark-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:28px}
.login-title{font-size:15px;color:var(--ink);margin-bottom:6px;font-weight:600}
.login-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:26px;line-height:1.6}
.login-field{text-align:left;margin-bottom:14px}
.login-field label{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--sovereign);margin-bottom:6px}
.login-field input{width:100%;border:1px solid var(--border-mid);border-radius:var(--radius);padding:11px 14px;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border .15s;background:var(--white)}
.login-field input:focus{border-color:var(--gold)}
.login-error{font-size:12px;color:#A8324D;margin-bottom:10px;min-height:14px}

/* ===== APP ===== */
.app{display:none;flex-direction:column;min-height:100vh}
.header{background:var(--plum);padding:16px 26px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-brand{display:flex;align-items:baseline;gap:2px}
.header-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);font-weight:600}
.header-tag{font-size:10.5px;color:rgba(255,255,255,0.55);margin-left:12px;letter-spacing:.04em}
.logout-btn{font-size:11.5px;color:rgba(255,255,255,0.6);background:none;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:6px 14px;cursor:pointer;transition:.15s}
.logout-btn:hover{background:rgba(255,255,255,0.1);color:white}

.main{display:flex;flex:1}
.sidebar{width:230px;flex-shrink:0;background:var(--plum-mid);padding:22px 0;display:flex;flex-direction:column;gap:2px}
@media(max-width:760px){.sidebar{display:none}}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:12px 22px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:12.5px;color:rgba(255,255,255,0.55);font-weight:500}
.sidebar-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.85)}
.sidebar-item.active{background:rgba(201,146,42,0.12);color:var(--gold-light);border-left-color:var(--gold);font-weight:600}
.sidebar-item.locked{opacity:.35;pointer-events:none}
.sidebar-num{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:9.5px;flex-shrink:0}
.sidebar-item.active .sidebar-num{background:var(--gold);border-color:var(--gold);color:var(--plum)}
.sidebar-item.done .sidebar-num{background:rgba(255,255,255,0.25);border-color:transparent;color:white}

.content{flex:1;overflow-y:auto;padding:36px 40px;max-width:820px}
.step-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);margin-bottom:8px}
.step-title{font-size:26px;color:var(--plum);margin-bottom:8px;font-weight:600}
.step-desc{font-size:13.5px;color:var(--ink-soft);line-height:1.7;margin-bottom:26px;max-width:600px}

.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--sovereign);margin-bottom:7px}
.field input,.field textarea{width:100%;border:1px solid var(--border-mid);border-radius:var(--radius);padding:11px 14px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--ink);background:var(--white);outline:none;transition:border .15s;resize:vertical}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{min-height:80px}
.field-hint{font-size:11.5px;color:var(--ink-pale);margin-top:5px}

.upload-wrap{border:1.5px dashed var(--border-mid);border-radius:var(--radius);padding:18px;background:var(--white);text-align:center;margin-bottom:8px;cursor:pointer;transition:.15s}
.upload-wrap:hover{border-color:var(--gold);background:var(--gold-pale)}
.upload-wrap input{display:none}
.upload-label{font-size:12.5px;color:var(--ink-soft)}
.upload-label strong{color:var(--sovereign)}
.upload-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.upload-chip{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--blush);border-radius:8px;padding:8px 12px;font-size:12.5px;color:var(--ink)}
.upload-chip.processing{color:var(--ink-pale)}
.upload-chip .remove-doc{cursor:pointer;color:var(--ink-pale);font-size:14px;font-weight:700;flex-shrink:0}
.upload-chip .remove-doc:hover{color:#A8324D}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}

.dee-notes-wrap{margin-bottom:18px}
.dee-notes-label{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin-bottom:7px}
.dee-notes-input{width:100%;border:1px solid rgba(201,146,42,0.4);border-radius:var(--radius);padding:11px 14px;font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);background:var(--gold-pale);outline:none;resize:vertical;min-height:70px}
.dee-notes-input:focus{border-color:var(--gold)}
.dee-notes-input::placeholder{color:var(--ink-pale);font-style:italic}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:6px;margin-bottom:24px}
.btn{padding:11px 22px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--sovereign);color:white}
.btn-primary:hover{background:#552444}
.btn-gold{background:var(--gold);color:white}
.btn-gold:hover{background:#B07F1F}
.btn-secondary{background:var(--white);color:var(--ink);border:1px solid var(--border-mid)}
.btn-secondary:hover{background:var(--blush)}
.btn:disabled{opacity:.4;pointer-events:none}

.output-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:20px;min-height:120px;font-size:13.5px;line-height:1.75;box-shadow:var(--shadow)}
.output-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:140px;gap:10px;color:var(--ink-pale)}
.output-placeholder .dot-lg{font-size:34px;color:var(--gold-light)}
.generating-msg{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft);padding:8px 0}
.spinner{width:16px;height:16px;border:2px solid var(--border-mid);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.out-h{font-family:'Playfair Display',serif;font-size:16px;color:var(--sovereign);margin:16px 0 8px;font-weight:600}
.out-h:first-child{margin-top:0}
.out-bullet{padding-left:16px;position:relative;margin-bottom:6px;color:var(--ink)}
.out-bullet::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.out-p{margin-bottom:10px;color:var(--ink)}

.coming-soon{background:var(--blush);border:1px dashed var(--border-mid);border-radius:var(--radius-lg);padding:40px 30px;text-align:center;color:var(--ink-soft)}
.coming-soon .dot-lg{font-size:30px;color:var(--gold);margin-bottom:10px}
.coming-soon h3{color:var(--plum);margin-bottom:6px;font-size:17px}

.locked-note{font-size:12.5px;color:var(--ink-pale);background:var(--blush);border-radius:8px;padding:10px 14px;margin-top:14px}

.step-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px}
.step-nav-btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--sovereign);background:none;border:1px solid var(--border-mid);border-radius:20px;padding:7px 14px;cursor:pointer;transition:.15s}
.step-nav-btn:hover{background:var(--blush)}
.step-nav-btn:disabled{opacity:.35;pointer-events:none}
.step-nav-mobile{display:none;gap:6px;flex-wrap:wrap}
@media(max-width:760px){.step-nav-mobile{display:flex}}
.step-pill{font-size:11px;padding:5px 10px;border-radius:14px;background:var(--blush);color:var(--ink-soft);cursor:pointer;border:none;font-weight:600}
.step-pill.active{background:var(--sovereign);color:white}
.step-pill.locked{opacity:.4;pointer-events:none}

.progress-summary{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:var(--shadow)}
.ps-stat{text-align:center;flex-shrink:0}
.ps-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--sovereign)}
.ps-label{font-size:10.5px;color:var(--ink-pale);text-transform:uppercase;letter-spacing:.04em}
.ps-bar-wrap{flex:1;min-width:160px}
.ps-bar-label{font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;display:flex;justify-content:space-between}
.ps-bar{height:7px;background:var(--blush);border-radius:4px;overflow:hidden}
.ps-bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .4s ease}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="wordmark">Linkspiration<span class="dot">.</span></div>
    <div class="wordmark-sub">by Unsilenced Co.</div>
    <div class="login-title" id="auth-title">Welcome back</div>
    <div class="login-sub" id="auth-sub">Your LinkedIn visibility, built with intention, not left to the algorithm's mood.</div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@business.com" onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="At least 6 characters" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn btn-gold" id="auth-submit-btn" style="width:100%;justify-content:center" onclick="doAuth()">Log In</button>
    <div style="margin-top:16px;font-size:12.5px;color:var(--ink-soft)">
      <span id="auth-toggle-text">New here?</span>
      <a href="#" id="auth-toggle-link" onclick="toggleAuthMode();return false;" style="color:var(--sovereign);font-weight:600;text-decoration:none">Create an account</a>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="header-brand">
      <span class="header-name">Linkspiration<span class="dot">.</span></span>
      <span class="header-tag">BY UNSILENCED CO.</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="save-indicator" style="font-size:11px;color:rgba(255,255,255,0.4)"></span>
      <button class="logout-btn" id="download-btn" onclick="downloadDoc()" style="background:var(--gold);color:var(--plum);border-color:var(--gold);font-weight:600">Download Word Doc</button>
      <button class="logout-btn" onclick="doLogout()">Log out</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
// Paste your values from Supabase > Project Settings > API
const SUPABASE_URL = "https://mkqlcqmkreiifvsvohua.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rcWxjcW1rcmVpaWZ2c3ZvaHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzM2NDksImV4cCI6MjA5OTc0OTY0OX0.IgJRzBirAj_ynbb2qYlYIqK4Q91X1I6lNI7J2m7du84";

// Claude's artifact preview cannot use localStorage, so auth sessions are kept in memory here
// (meaning you'll need to log in again each time you reopen this preview while testing).
// Once deployed to your own domain, delete the "storage: memoryStorage" line below so logins
// persist normally between visits, like any real website.
const memoryStorage = {
  _data: {},
  getItem(key){ return this._data[key] || null; },
  setItem(key, value){ this._data[key] = value; },
  removeItem(key){ delete this._data[key]; }
};

const supabaseClient = (typeof supabase !== 'undefined' && SUPABASE_URL.startsWith('http'))
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { storage: memoryStorage } })
  : null;

let currentUser = null;
let authMode = 'login'; // 'login' or 'signup'

const STEPS = [
  {id:'foundation', label:'Foundation', eyebrow:'Step 1'},
  {id:'profile', label:'LinkedIn Profile', eyebrow:'Step 2'},
  {id:'content', label:'First Posts', eyebrow:'Step 3'},
  {id:'audience', label:'Audience & Outreach', eyebrow:'Step 4'},
  {id:'offline', label:'Taking It Offline', eyebrow:'Step 5'}
];

let state = {
  step: 'foundation',
  completed: {},
  intake: {},
  uploadedDocs: [],
  deeNotes: { profile:'', content:'', audience:'', offline:'' },
  outputs: { profile:'', content:'', audience:'', offline:'' }
};

/* ============ PERSISTENCE ============ */
let saveTimer = null;

function saveState(){
  const indicator = document.getElementById('save-indicator');
  if(!currentUser || !supabaseClient) return;
  if(indicator) indicator.textContent = 'saving...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const { error } = await supabaseClient.from('client_sessions').upsert({
        user_id: currentUser.id,
        email: currentUser.email,
        state: state,
        updated_at: new Date().toISOString()
      });
      if(error) throw error;
      if(indicator) indicator.textContent = 'saved';
      setTimeout(()=>{ if(indicator) indicator.textContent=''; }, 1500);
    }catch(e){
      if(indicator) indicator.textContent = 'save failed';
    }
  }, 600);
}

async function loadState(){
  if(!currentUser || !supabaseClient) return;
  try{
    const { data, error } = await supabaseClient
      .from('client_sessions')
      .select('state')
      .eq('user_id', currentUser.id)
      .maybeSingle();
    if(data && data.state){
      state = Object.assign(state, data.state);
    }
  }catch(e){
    // no saved session yet, that's fine
  }
}

/* ============ AUTH ============ */
function toggleAuthMode(){
  authMode = authMode === 'login' ? 'signup' : 'login';
  const title = document.getElementById('auth-title');
  const sub = document.getElementById('auth-sub');
  const submitBtn = document.getElementById('auth-submit-btn');
  const toggleText = document.getElementById('auth-toggle-text');
  const toggleLink = document.getElementById('auth-toggle-link');
  document.getElementById('login-error').textContent = '';

  if(authMode === 'signup'){
    title.textContent = 'Create your account';
    sub.textContent = "Let's build your LinkedIn visibility, step by step.";
    submitBtn.textContent = 'Create Account';
    toggleText.textContent = 'Already have an account?';
    toggleLink.textContent = 'Log in';
  } else {
    title.textContent = 'Welcome back';
    sub.textContent = "Your LinkedIn visibility, built with intention, not left to the algorithm's mood.";
    submitBtn.textContent = 'Log In';
    toggleText.textContent = 'New here?';
    toggleLink.textContent = 'Create an account';
  }
}

async function doAuth(){
  const errorEl = document.getElementById('login-error');
  errorEl.textContent = '';

  if(!supabaseClient){
    errorEl.textContent = 'Setup needed: add your Supabase URL and key in the CONFIG section of the code.';
    return;
  }

  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if(!email || !password){
    errorEl.textContent = 'Enter both an email and password.';
    return;
  }

  const submitBtn = document.getElementById('auth-submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Please wait...';

  try{
    let result;
    if(authMode === 'signup'){
      result = await supabaseClient.auth.signUp({ email, password });
    } else {
      result = await supabaseClient.auth.signInWithPassword({ email, password });
    }
    if(result.error) throw result.error;

    if(authMode === 'signup' && result.data.user && !result.data.session){
      errorEl.style.color = 'var(--sovereign)';
      errorEl.textContent = 'Account created. Check your email to confirm, then log in.';
      toggleAuthMode();
      submitBtn.disabled = false;
      return;
    }

    currentUser = result.data.user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    await loadState();
    render();
  }catch(e){
    errorEl.style.color = '#A8324D';
    errorEl.textContent = e.message || 'Something went wrong. Try again.';
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = authMode === 'signup' ? 'Create Account' : 'Log In';
  }
}

async function doLogout(){
  if(supabaseClient) await supabaseClient.auth.signOut();
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
}

/* ============ NAV ============ */
function goTo(stepId){
  const idx = STEPS.findIndex(s=>s.id===stepId);
  const prevId = idx>0 ? STEPS[idx-1].id : null;
  if(prevId && !state.completed[prevId] && idx>1){
    // allow moving forward one step past last completed only
  }
  state.step = stepId;
  render();
}

function isUnlocked(idx){
  if(idx===0) return true;
  const prev = STEPS[idx-1];
  return !!state.completed[prev.id] || state.step===STEPS[idx].id;
}

/* ============ RENDER SIDEBAR ============ */
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = STEPS.map((s,i)=>{
    const unlocked = isUnlocked(i);
    const active = state.step===s.id;
    const done = !!state.completed[s.id];
    let cls = 'sidebar-item';
    if(active) cls+=' active';
    if(done) cls+=' done';
    if(!unlocked) cls+=' locked';
    return `<div class="${cls}" onclick="${unlocked?`goTo('${s.id}')`:''}">
      <span class="sidebar-num">${done?'✓':(i+1)}</span>
      <span>${s.label}</span>
    </div>`;
  }).join('');
}

/* ============ CLAUDE CALL ============ */
async function callClaude(prompt, maxTokens){
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens || 1500,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  let text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  text = text.replace(/—/g, ', ').replace(/–/g, '-'); // strip em/en dashes per Dee's voice rules
  return text;
}

function formatOutput(raw){
  // strip hashtag tokens left over from earlier generations, before the no-hashtag rule existed
  raw = raw.replace(/#[a-zA-Z0-9_]+/g, '');

  // drop whole sections/lines that are specifically about hashtags (now-orphaned headers, bullets)
  const rawLines = raw.split('\n');
  const kept = [];
  let skippingSection = false;
  for(let line of rawLines){
    const trimmed = line.trim();
    const isHeader = /^#{1,3}\s/.test(trimmed);
    if(isHeader){
      skippingSection = /hashtag/i.test(trimmed);
      if(skippingSection) continue;
    } else if(skippingSection){
      continue; // still inside a hashtag section, skip until next header
    }
    // drop individual bullet/label lines that are just about hashtags
    if(/^[-•]?\s*(hashtags?|creator hashtags?)\s*[:\-]/i.test(trimmed)) continue;
    kept.push(line);
  }
  raw = kept.join('\n').replace(/[ \t]{2,}/g, ' ').replace(/\n[ \t]+\n/g, '\n\n');

  // lightweight markdown-ish -> html
  const lines = raw.split('\n');
  let html = '';
  for(let line of lines){
    line = line.trim();
    if(!line){ continue; }
    line = line.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    if(/^#{1,3}\s/.test(line)){
      html += `<div class="out-h">${line.replace(/^#{1,3}\s/,'')}</div>`;
    } else if(/^[-•]\s/.test(line)){
      html += `<div class="out-bullet">${line.replace(/^[-•]\s/,'')}</div>`;
    } else if(/^\d+[\.\)]\s/.test(line)){
      html += `<div class="out-bullet">${line}</div>`;
    } else {
      html += `<div class="out-p">${line}</div>`;
    }
  }
  return html || raw;
}

/* ============ PDF UPLOAD ============ */
if(typeof pdfjsLib !== 'undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  // suppress the benign "fake worker" warning pdf.js logs when it falls back to main-thread parsing
  const _origWarn = console.warn.bind(console);
  console.warn = function(...args){
    if(args.some(a => typeof a === 'string' && a.toLowerCase().includes('fake worker'))) return;
    _origWarn(...args);
  };
}

function renderUploadList(){
  if(!state.uploadedDocs || !state.uploadedDocs.length) return '';
  return state.uploadedDocs.map((doc,idx)=>`
    <div class="upload-chip">
      <span>${doc.name} ${doc.text ? `(${doc.text.length.toLocaleString()} characters extracted)` : ''}</span>
      <span class="remove-doc" onclick="removeUploadedDoc(${idx})">✕</span>
    </div>
  `).join('');
}

async function handleFileUpload(inputEl){
  const files = Array.from(inputEl.files || []);
  if(!files.length) return;
  const listEl = document.getElementById('upload-list');

  for(const file of files){
    const placeholder = { name: file.name, text: '', processing: true };
    state.uploadedDocs.push(placeholder);
    if(listEl) listEl.innerHTML = renderUploadList() + `<div class="upload-chip processing">Extracting text from ${file.name}...</div>`;

    try{
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer, verbosity: 0 }).promise;
      let text = '';
      for(let p = 1; p <= pdf.numPages; p++){
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        text += content.items.map(item=>item.str).join(' ') + '\n';
      }
      placeholder.text = text.trim();
      placeholder.processing = false;
    }catch(e){
      placeholder.text = '';
      placeholder.error = true;
    }
    if(listEl) listEl.innerHTML = renderUploadList();
  }
  saveState();
  inputEl.value = '';
}

function removeUploadedDoc(idx){
  state.uploadedDocs.splice(idx, 1);
  saveState();
  render();
}

function progressPercent(){
  const doneCount = STEPS.filter(s=>state.completed[s.id]).length;
  return Math.round((doneCount / STEPS.length) * 100);
}

function renderProgressSummary(){
  const doneCount = STEPS.filter(s=>state.completed[s.id]).length;
  const pct = progressPercent();
  return `
    <div class="progress-summary">

        <div class="ps-bar"><div class="ps-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
  `;
}

function renderStepNav(){
  const idx = STEPS.findIndex(s=>s.id===state.step);
  const prevOk = idx>0;
  const nextOk = idx<STEPS.length-1 && isUnlocked(idx+1);
  const pills = STEPS.map((s,i)=>{
    const unlocked = isUnlocked(i);
    let cls = 'step-pill';
    if(state.step===s.id) cls += ' active';
    if(!unlocked) cls += ' locked';
    return `<button class="${cls}" onclick="${unlocked?`goTo('${s.id}')`:''}">${i+1}. ${s.label}</button>`;
  }).join('');
  return `
    <div class="step-nav">
      <button class="step-nav-btn" onclick="prevStep()" ${prevOk?'':'disabled'}>← Back</button>
      <span style="font-size:11.5px;color:var(--ink-pale)">Step ${idx+1} of ${STEPS.length}</span>
      <button class="step-nav-btn" onclick="nextStep()" ${nextOk?'':'disabled'}>Next →</button>
    </div>
    <div class="step-nav-mobile" style="margin-bottom:18px">${pills}</div>
  `;
}

function prevStep(){
  const idx = STEPS.findIndex(s=>s.id===state.step);
  if(idx>0) goTo(STEPS[idx-1].id);
}
function nextStep(){
  const idx = STEPS.findIndex(s=>s.id===state.step);
  if(idx<STEPS.length-1 && isUnlocked(idx+1)) goTo(STEPS[idx+1].id);
}

function render(){
  renderSidebar();

function downloadDoc(){
  const btn = document.getElementById('download-btn');
  if(btn) btn.disabled = true;

  const clientName = state.intake.name ? state.intake.name.replace(/[^a-z0-9]+/gi,'-').toLowerCase() : 'client';
  const bodyHtml = buildSummaryHtml();

  const wordHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>Linkspiration LinkedIn Visibility Plan</title>
<!--[if gte mso 9]>
<xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml>
<![endif]-->
<style>
  @page { margin: 1in; }
  body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #231821; line-height: 1.5; }
  .doc-word { font-family: Georgia, serif; color: #2C1A2E; font-size: 26pt; font-weight: bold; }
  .doc-sub { color: #6E5E6C; font-size: 9pt; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20pt; }
  h2 { font-family: Georgia, serif; color: #6B3058; font-size: 15pt; margin-top: 22pt; margin-bottom: 8pt; border-bottom: 1.5pt solid #C9922A; padding-bottom: 4pt; }
  .out-h { font-family: Georgia, serif; color: #6B3058; font-size: 12.5pt; font-weight: bold; margin-top: 12pt; margin-bottom: 4pt; }
  .field-row { margin-bottom: 8pt; }
  .field-row .k { font-size: 8.5pt; text-transform: uppercase; letter-spacing: 0.5pt; color: #C9922A; font-weight: bold; }
  .field-row .v { color: #231821; }
  .out-p, p { margin-bottom: 8pt; }
  .out-bullet { margin-left: 14pt; margin-bottom: 5pt; }
  .empty { color: #A8A8C0; font-style: italic; }
</style>
</head>
<body>${bodyHtml}</body>
</html>`;

  const blob = new Blob(['\ufeff', wordHtml], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `linkspiration-plan-${clientName}.doc`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  if(btn) btn.disabled = false;
}

function placeholderBox(msg){

  return `<div class="output-placeholder"><div class="dot-lg">•</div><p>${msg}</p></div>`;
}
function generatingHtml(){
  return `<div class="generating-msg"><div class="spinner"></div>Drafting, aligned to the methodology...</div>`;
}
